<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Tartalom kezelés | Lélekliget</title>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'tokemate/lelekliget_eles_2026',
            branch: 'main',
            base_url: 'https://www.lelekligetdabas.hu',
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/images/blog',
          public_folder: '/images/blog',
          locale: 'hu',
          collections: [
            {
              name: 'categories',
              label: 'Kategóriák',
              files: [
                {
                  name: 'categories',
                  label: 'Kategória lista',
                  file: 'src/data/categories.yml',
                  fields: [
                    {
                      label: 'Kategóriák',
                      name: 'items',
                      widget: 'list',
                      field: { label: 'Kategória neve', name: 'name', widget: 'string' },
                    },
                  ],
                },
              ],
            },
            {
              name: 'blog',
              label: 'Blog cikkek',
              label_singular: 'Blog cikk',
              folder: 'src/content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Cím', name: 'title', widget: 'string' },
                { label: 'Kivonat', name: 'excerpt', widget: 'text', required: false, hint: 'Rövid összefoglaló (opcionális, de ajánlott)' },
                { label: 'Dátum', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD', date_format: 'YYYY. MM. DD.', time_format: false },
                {
                  label: 'Kategória',
                  name: 'category',
                  widget: 'relation',
                  required: false,
                  collection: 'categories',
                  file: 'categories',
                  search_fields: ['items.*.name'],
                  value_field: 'items.*.name',
                  display_fields: ['items.*.name'],
                  hint: 'Új kategóriát a "Kategóriák" menüpontban tudsz felvenni vagy törölni.',
                },
                { label: 'Borítókép', name: 'coverImage', widget: 'image', required: false },
                { label: 'Tartalom', name: 'body', widget: 'markdown', modes: ['rich_text'] },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
