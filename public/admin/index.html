<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Tartalom kezelés | Lélekliget</title>
    <style>
      #cms-debug{position:fixed;bottom:0;left:0;right:0;background:#1e1e1e;color:#0f0;font:12px monospace;padding:8px 12px;z-index:99999;max-height:120px;overflow-y:auto;display:none}
    </style>
    <script>
      var dbg = null;
      function cmsLog(msg) {
        if (!dbg) { dbg = document.getElementById('cms-debug'); }
        if (dbg) { dbg.style.display='block'; dbg.textContent += msg + '\n'; dbg.scrollTop=9999; }
        console.log('[CMS]', msg);
      }
      window.addEventListener('message', function(e) {
        var d = typeof e.data === 'string' ? e.data.substring(0, 100) : JSON.stringify(e.data);
        cmsLog('MSG origin=' + e.origin + ' data=' + d);
      });
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <div id="cms-debug"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      try {
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'tokemate/lelekliget_eles_2026',
            branch: 'main',
            base_url: 'https://lelekligetdabas.hu',
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/images/blog',
          public_folder: '/images/blog',
          locale: 'hu',
          collections: [
            {
              name: 'blog',
              label: 'Blog cikkek',
              label_singular: 'Blog cikk',
              folder: 'src/content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Cím', name: 'title', widget: 'string' },
                { label: 'Kivonat', name: 'excerpt', widget: 'text', required: false, hint: 'Rövid összefoglaló (opcionális, de ajánlott)' },
                { label: 'Dátum', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD', date_format: 'YYYY. MM. DD.', time_format: false },
                { label: 'Kategória', name: 'category', widget: 'select', required: false, options: ['Prevenció', 'Életmód', 'Diagnosztika', 'Gyermekegészség', 'Holisztikus egészség'] },
                { label: 'Borítókép', name: 'coverImage', widget: 'image', required: false },
                { label: 'Tartalom', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
      console.log('[CMS DEBUG] CMS.init() meghívva');
      } catch(err) {
        console.error('[CMS DEBUG] CMS.init() hiba:', err);
      }
    </script>
  </body>
</html>
