<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Tartalom kezelés | Lélekliget</title>
    <style>
      #cms-debug{position:fixed;bottom:0;left:0;right:0;background:#1e1e1e;color:#0f0;font:11px monospace;padding:8px 12px;z-index:99999;max-height:200px;overflow-y:auto;display:none}
    </style>
    <script>
      var dbg = null;
      function cmsLog(msg) {
        if (!dbg) { dbg = document.getElementById('cms-debug'); }
        if (dbg) { dbg.style.display='block'; dbg.textContent += msg + '\n'; dbg.scrollTop=9999; }
        console.log('[CMS]', msg);
      }

      // 1) console.error / warn elfogás
      var _oErr = console.error.bind(console);
      console.error = function() {
        var s = Array.from(arguments).map(function(a){
          return (a && a.message) ? a.message : (typeof a==='object'?JSON.stringify(a):String(a));
        }).join(' ').substring(0,200);
        cmsLog('ERR: '+s);
        return _oErr.apply(console, arguments);
      };
      var _oWarn = console.warn.bind(console);
      console.warn = function() {
        var s = Array.from(arguments).map(function(a){
          return typeof a==='object'?JSON.stringify(a):String(a);
        }).join(' ').substring(0,200);
        cmsLog('WARN: '+s);
        return _oWarn.apply(console, arguments);
      };

      // 2) fetch elfogás – minden github.com és /api/ hívás
      var _oFetch = window.fetch;
      window.fetch = function(url, opts) {
        var u = typeof url === 'string' ? url : (url&&url.url)||'?';
        var short = u.replace('https://','').substring(0,90);
        if (u.indexOf('github') >= 0 || u.indexOf('/api/') >= 0) {
          cmsLog('FETCH → '+short);
        }
        return _oFetch.apply(window, arguments).then(function(res) {
          if (u.indexOf('github') >= 0 || u.indexOf('/api/') >= 0) {
            cmsLog('FETCH ← '+res.status+' '+short.substring(0,70));
            if (!res.ok) {
              res.clone().text().then(function(t){ cmsLog('BODY: '+t.substring(0,120)); });
            }
          }
          return res;
        }, function(err) {
          cmsLog('FETCH ERR: '+err.message+' '+short.substring(0,50));
          throw err;
        });
      };

      // 3) message listener interceptor (WeakMap-alapú, helyes remove)
      var _fnMap = new WeakMap();
      var _cnt = 0;
      var _oAEL = window.addEventListener.bind(window);
      var _oREL = window.removeEventListener.bind(window);
      window.addEventListener = function(type, fn, opts) {
        if (type === 'message' && fn) {
          _cnt++;
          var idx = _cnt;
          cmsLog('[L] #'+idx+' added');
          var w = function(e) {
            if (typeof e.data === 'string' && e.data.indexOf('authorization:') === 0) {
              cmsLog('[L] #'+idx+' KAPTA AUTH origin='+e.origin);
            }
            return fn.apply(this, arguments);
          };
          _fnMap.set(fn, w);
          return _oAEL(type, w, opts);
        }
        return _oAEL(type, fn, opts);
      };
      window.removeEventListener = function(type, fn, opts) {
        if (type === 'message' && fn) {
          cmsLog('[L] removed');
          var w = _fnMap.get(fn);
          if (w) { _fnMap.delete(fn); return _oREL(type, w, opts); }
        }
        return _oREL(type, fn, opts);
      };

      // 4) saját listener – auth üzenet figyelés
      _oAEL('message', function(e) {
        if (typeof e.data === 'string' && e.data.indexOf('authorization:') === 0) {
          cmsLog('MSG AUTH origin='+e.origin+' data='+e.data.substring(0,100));
        }
      }, false);

      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <div id="cms-debug"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      try {
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'tokemate/lelekliget_eles_2026',
            branch: 'main',
            base_url: 'https://www.lelekligetdabas.hu',
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/images/blog',
          public_folder: '/images/blog',
          locale: 'hu',
          collections: [
            {
              name: 'blog',
              label: 'Blog cikkek',
              label_singular: 'Blog cikk',
              folder: 'src/content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Cím', name: 'title', widget: 'string' },
                { label: 'Kivonat', name: 'excerpt', widget: 'text', required: false, hint: 'Rövid összefoglaló (opcionális, de ajánlott)' },
                { label: 'Dátum', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD', date_format: 'YYYY. MM. DD.', time_format: false },
                { label: 'Kategória', name: 'category', widget: 'select', required: false, options: ['Prevenció', 'Életmód', 'Diagnosztika', 'Gyermekegészség', 'Holisztikus egészség'] },
                { label: 'Borítókép', name: 'coverImage', widget: 'image', required: false },
                { label: 'Tartalom', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
      } catch(err) {
        cmsLog('INIT ERR: '+err.message);
      }
    </script>
  </body>
</html>
